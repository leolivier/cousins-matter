# Creates a multiplatform image of cousins matter and push it to ghcr.io for each new release
name: Image Build & Push

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

  release:
    types: [prereleased, published]

  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Job 1 – Lint, build test image and prepare shared artefacts
  # ──────────────────────────────────────────────────────────────────────────────
  lint-and-build:
    if: github.event_name == 'release' || github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    uses: ./.github/workflows/reusable-lint-and-build.yml
    with:
      registry: 'ghcr.io'
      image_name: ${{ github.repository }}
      tags_def: ${{ github.event_name == 'release' && 'type=semver,pattern={{version}}' || github.event_name == 'push' && 'type=ref,event=branch' || 'type=sha' }}
      test_tag: 'test-${{ github.sha }}'
    secrets: inherit

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 2 – Test Docker Image (runs in parallel with jobs 3, 4 & 5)
  # ──────────────────────────────────────────────────────────────────────────────
  test-docker-image:
    needs: lint-and-build
    uses: ./.github/workflows/reusable-test-docker-image.yml
    secrets: inherit

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 3 – Test install & migration scripts (runs in parallel with jobs 2, 4 & 5)
  # ──────────────────────────────────────────────────────────────────────────────
  test-install-migrate:
    needs: lint-and-build
    if: ${{ github.actor != 'dependabot[bot]' }}
    uses: ./.github/workflows/reusable-test-install-migrate.yml
    secrets: inherit

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 4 – Test S3 backend (runs in parallel with jobs 2, 3 & 5)
  # ──────────────────────────────────────────────────────────────────────────────
  test-s3:
    needs: lint-and-build
    if: ${{ github.actor != 'dependabot[bot]' }}
    uses: ./.github/workflows/reusable-test-docker-image.yml
    with:
      s3: true
    secrets: inherit

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 5 – Test UI (runs in parallel with jobs 2, 3 & 4)
  # ──────────────────────────────────────────────────────────────────────────────
  test-ui:
    needs: lint-and-build
    if: ${{ github.actor != 'dependabot[bot]' }}
    uses: ./.github/workflows/reusable-test-docker-image.yml
    with:
      ui: true
    secrets: inherit

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 6 – Final multiplatform build & push (waits for jobs 2, 3, 4 & 5)
  # ──────────────────────────────────────────────────────────────────────────────
  build-and-push:
    needs: [test-docker-image, test-install-migrate, test-s3, test-ui]
    if: ${{ github.actor != 'dependabot[bot]' }}
    uses: ./.github/workflows/reusable-build-and-push.yml
    with:
      registry: 'ghcr.io'
      image_name: ${{ github.repository }}
      platforms: 'linux/amd64,linux/arm64'
      push: ${{ github.event_name == 'release' || github.event_name == 'push' }}
      tags_def: ${{ github.event_name == 'release' && 'type=semver,pattern={{version}}' || github.event_name == 'push' && 'type=ref,event=branch' || 'type=sha' }}
    secrets: inherit

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 7 – Verify production image starts correctly (waits for job 6)
  # RUNS ONLY FOR RELEASES
  # ──────────────────────────────────────────────────────────────────────────────
  verify-production-image:
    needs: build-and-push
    if: ${{ github.event_name == 'release' }}
    uses: ./.github/workflows/reusable-verify-production-image.yml
    with:
      registry: 'ghcr.io'
      image_name: ${{ github.repository }}
      tags_def: ${{ 'type=semver,pattern={{version}}' }}
    secrets: inherit
