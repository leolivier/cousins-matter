# Reusable workflow to build the multiplatform production Docker image and push to registry.
name: Reusable Build & Push

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      image_name:
        required: true
        type: string
      platforms:
        required: true
        type: string
      push:
        required: true
        type: boolean
      tags_def:
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Login to GHCR.io
        uses: docker/login-action@v4
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ inputs.registry }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.image_name }}
          tags: ${{ inputs.tags_def }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: remove tests resources from .dockerignore before real build
        run: |
          echo '**/tests/' >> .dockerignore

      - name: Determine version
        id: get_version
        run: |
            if [[ ${{ github.event_name }} == 'release' ]]; then
              echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            elif [[ ${{ github.ref }} == refs/tags/* ]]; then
              echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            else
              echo "VERSION=$(git describe --tags --abbrev=0)+$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            fi

      - name: Create release.txt
        run: echo ${{ steps.get_version.outputs.VERSION }} > release.txt

      - name: Upload release.txt
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: release.txt

      - name: Build and push
        id: build_push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ inputs.registry }}/${{ inputs.image_name }}:buildcache
          cache-to: type=registry,ref=${{ inputs.registry }}/${{ inputs.image_name }}:buildcache,mode=max
