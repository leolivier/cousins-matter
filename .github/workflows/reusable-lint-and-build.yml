# Reusable workflow to lint code and build/upload the test docker image.
name: Reusable Lint & Build

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      image_name:
        required: true
        type: string
      tags_def:
        required: true
        type: string
      test_tag:
        required: true
        type: string
    outputs:
      runner_id:
        description: "The runner UID for docker build"
        value: ${{ jobs.lint-and-build.outputs.runner_id }}

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      runner_id: ${{ steps.get_runner_id.outputs.RUNNER_ID }}
    steps:

      - name: Determine branch ref
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.branch.outputs.ref }}
          fetch-depth: 0  # Required to get all tags
          lfs: true

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dev dependencies
        run: |
          pip install uv
          uv sync --dev

      - name: Check if package.json changed
        id: pkgjson
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
            CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- package.json)
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- package.json)
          fi
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update vendor scripts
        if: steps.pkgjson.outputs.changed == 'true'
        run: ./scripts/dev/vendor-update.sh


      - name: Commit vendored assets (package.json changed only)
        if: steps.pkgjson.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add core/static/core/vendor
          git diff --cached --quiet || git commit -m "chore: update vendored assets"
          git push origin HEAD:${{ steps.branch.outputs.ref }}

      - name: Lint with ruff
        run: |
          uv run ruff format -q .
          uv run ruff check --fix .
          uv run bandit -r . -c pyproject.toml
          uv run pip-audit .
          uv run mypy ./ --ignore-missing-imports --exclude migrations/* --exclude '.venv/*'


      - name: Login to GHCR.io
        uses: docker/login-action@v4
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ inputs.registry }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.image_name }}
          tags: ${{ inputs.tags_def }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: get runner id
        id: get_runner_id
        run: |
          echo "RUNNER_ID=$(id -u)" >> $GITHUB_OUTPUT

      - name: Build for test
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            UID=${{ steps.get_runner_id.outputs.RUNNER_ID }}
          tags: ${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.test_tag }}
          cache-from: type=registry,ref=${{ inputs.registry }}/${{ inputs.image_name }}:test-buildcache
          cache-to: type=registry,ref=${{ inputs.registry }}/${{ inputs.image_name }}:test-buildcache,mode=max

      - name: Save test Docker image as tarball
        run: |
          docker save ${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.test_tag }} \
            | gzip > /tmp/test-image.tar.gz

      - name: Upload test Docker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-docker-image
          path: /tmp/test-image.tar.gz
          retention-days: 1
