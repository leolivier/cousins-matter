# Reusable workflow to run either full test suite (UI included) or S3 storage integration tests.
name: Reusable Test Docker Image

on:
  workflow_call:
    inputs:
      s3:
        required: false
        type: boolean
        default: false

jobs:
  test-docker-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dev dependencies and Install Playwright browsers (skipped in s3 test mode)
        if: ${{ !inputs.s3 }}
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: |
          python -m pip install -r requirements-dev.txt
          playwright install --with-deps

      - name: Download test Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: test-docker-image
          path: /tmp

      - name: Load test Docker image
        run: |
          docker load < /tmp/test-image.tar.gz

      - name: Write .env
        env:
          S3_MEDIA_STORAGE_OPTIONS: '{\"access_key\":\"${{ secrets.ACCESS_KEY }}\",\"secret_key\":\"${{ secrets.SECRET_KEY }}\",\"bucket_name\":\"${{ secrets.BUCKET_NAME }}\",\"endpoint_url\":\"https://${{ secrets.ACCOUNT_ID }}.r2.cloudflarestorage.com\"}'
        run: |
          cp .github/workflows/test.env $GITHUB_WORKSPACE/.env
          echo "COUSINS_MATTER_IMAGE=ghcr.io/${{ github.repository }}:test-${{ github.sha }}" >> $GITHUB_WORKSPACE/.env
          if [ "${{ inputs.s3 }}" = "true" ]; then
            echo 'MEDIA_STORAGE=storages.backends.s3.S3Storage' >> $GITHUB_WORKSPACE/.env
            echo "MEDIA_STORAGE_OPTIONS='${{ env.S3_MEDIA_STORAGE_OPTIONS }}'" >> $GITHUB_WORKSPACE/.env
          fi
          cat $GITHUB_WORKSPACE/.env
          echo "$GITHUB_WORKSPACE/.local/bin" >> $GITHUB_PATH

      - name: Test Docker Image
        run: |
          python ./scripts/manage_cousins_matter.py install -e -n -d "$GITHUB_WORKSPACE"

          # Clean up any leftover volumes/containers
          docker compose -f docker-compose.yml down -v || true
          docker volume prune -f || true

          # Start containers
          docker compose -f docker-compose.yml up -d --wait --wait-timeout 30

          # Verify container exists and is running
          docker ps | grep cousins-matter || (docker ps && exit 1)

          # Copy requirements
          docker cp requirements-dev.txt cousins-matter:/app/
          # Install dev requirements inside container
          docker exec -u root cousins-matter python -m pip install -r requirements-dev.txt

          if [ "${{ inputs.s3 }}" = "false" ]; then
            # Install browser dependencies inside container only if not S3 (no UI tests in S3)
            docker exec -u root cousins-matter apt-get update
            docker exec -u root cousins-matter apt-get install -y wget gnupg
            docker exec cousins-matter python -m playwright install --with-deps chromium
            # Run the test suite
            docker exec cousins-matter python manage.py test --failfast
          else
            docker exec cousins-matter python manage.py test --failfast --exclude-tag=ui
          fi

      - name: Show docker-compose services logs on failure
        if: failure()
        run: |
          cat $GITHUB_WORKSPACE/.env
          docker ps
          echo "====================cousins-matter================================"
          docker logs cousins-matter
          echo "====================cousins-matter.qcluster======================="
          docker logs cousins-matter.qcluster
          echo "====================cousins-matter.db============================="
          docker logs cousins-matter.db
