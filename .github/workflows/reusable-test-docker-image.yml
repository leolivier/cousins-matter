# Reusable workflow to run either full test suite (UI included) or S3 storage integration tests.
name: Reusable Test Docker Image

on:
  workflow_call:
    inputs:
      s3:
        required: false
        type: boolean
        default: false
      ui:
        required: false
        type: boolean
        default: false

jobs:
  test-docker-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Load test Docker image
        uses: ./.github/actions/load-docker-image

      - name: Write base test .env
        uses: ./.github/actions/write-test-env
        with:
          test_image_ref: ghcr.io/${{ github.repository }}:test-${{ github.sha }}

      - name: Write additional .env for S3 integration tests
        if: ${{ inputs.s3 }}
        env:
          S3_MEDIA_STORAGE_OPTIONS: '{\"access_key\":\"${{ secrets.ACCESS_KEY }}\",\"secret_key\":\"${{ secrets.SECRET_KEY }}\",\"bucket_name\":\"${{ secrets.BUCKET_NAME }}\",\"endpoint_url\":\"https://${{ secrets.ACCOUNT_ID }}.r2.cloudflarestorage.com\"}'
        run: |
          echo 'MEDIA_STORAGE=storages.backends.s3.S3Storage' >> $GITHUB_WORKSPACE/.env
          echo "MEDIA_STORAGE_OPTIONS='${{ env.S3_MEDIA_STORAGE_OPTIONS }}'" >> $GITHUB_WORKSPACE/.env

      - name: Start Docker Containers
        run: |
          python ./scripts/manage_cousins_matter.py install -e -n -d "$GITHUB_WORKSPACE"

          # Clean up any leftover volumes/containers
          docker compose -f docker-compose.yml down -v || true
          docker volume prune -f || true

          # Start containers
          docker compose -f docker-compose.yml up -d --wait --wait-timeout 30

          # Verify container exists and is running
          docker ps | grep cousins-matter || (docker ps && exit 1)

      - name: Install Python Dev Dependencies in Container (always)
        run: |
          docker cp pyproject.toml cousins-matter:/app/
          docker exec -u root cousins-matter pip install uv
          docker exec -u root cousins-matter uv sync --dev

      - name: Install Playwright & Browsers inside Container (UI mode only)
        # env:
        #   PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        if: ${{ inputs.ui }}
        run: |
          # playwright install --with-deps
          docker exec -u root cousins-matter apt-get update
          docker exec -u root cousins-matter apt-get install -y wget gnupg
          docker exec -u root cousins-matter python -m playwright install-deps chromium
          docker exec cousins-matter python -m playwright install chromium

      - name: Run Tests (default or S3 mode)
        run: |
          if [ ${{ inputs.ui }} == true ]; then
            docker exec cousins-matter python manage.py test --failfast --tag=ui
          else
            docker exec cousins-matter python manage.py test --failfast --exclude-tag=ui
          fi

      - name: Show docker-compose services logs on failure
        if: failure()
        uses: ./.github/actions/show-logs-on-failure
        with:
          env_file_path: ${{ github.workspace }}/.env

      - name: Upload screenshots
        if: failure() && inputs.ui
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: /tmp/*.png
          retention-days: 7
