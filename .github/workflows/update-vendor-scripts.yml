# workflow déclenché sur les PR de dependabot
on:
  pull_request:
    paths:
      - 'package.json'

jobs:
  vendor:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/dev/vendor-update.sh
      - run: |
          git config user.name "github-actions"
          git add core/static/vendor
          git commit -m "chore: update vendored assets" || echo "no changes"
          git push
