{% load i18n static flatpages cm_tags %}
<!DOCTYPE html>
{% get_current_language as LANGUAGE_CODE %}
<html lang="{{LANGUAGE_CODE}}" {%if settings.DARK_MODE%}data-theme="dark" {%endif%}>

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% title _("Home") %}{% endblock %}</title>
  {# bulma stylesheet #}
  <link rel="stylesheet" href="{% static 'core/vendor/bulma.min.css' %}">
  {# material design icons (webfont vendored under core/vendor/mdi/) #}
  <link rel="stylesheet" href="{% static 'core/vendor/mdi/css/materialdesignicons.min.css' %}">
  {# jquery #}
  <script src="{% static 'core/vendor/jquery.min.js' %}"></script>
  {# htmx #}
  <script src="{% static 'core/vendor/htmx.min.js' %}"></script>
  {# htmx: nonce its injected <style> (indicator classes) so it passes CSP style-src nonce #}
  <script nonce="{{ csp_nonce }}">htmx.config.inlineStyleNonce = "{{ csp_nonce }}";</script>
  {# hyperscript #}
  <script src="{% static 'core/vendor/hyperscript.min.js' %}"></script>
  {% block header %}{%endblock%}
  {# cousins matter css and js#}
  <link rel="stylesheet" href="{% static 'core/css/core.min.css' %}">
  <script src="{% static 'core/js/core.min.js' %}"></script>
  {# Custom CSS Theme#}
  <link rel="stylesheet" href="{{settings.PUBLIC_MEDIA_URL}}theme.css">
  {# favicon #}
  <link rel="shortcut icon" type="image/png" href="{% static 'core/images/favicon.jpg' %}" />
  {# javascript catalog #}
  <script src="{% url 'core:javascript-catalog' LANGUAGE_CODE %}"></script>
  {%if settings.DEBUG_HTMX%}
  <script nonce="{{ csp_nonce }}">htmx.logAll();</script> <!-- for debugging -->{%endif%}
</head>

<body hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'>

  {% block navbar %}
  {%if user.is_authenticated %}
  {% include "core/navbar.html" %}
  {% else %}
  {% include "core/unauthenticated-navbar.html" %}
  {% endif %}
  {% endblock %}

  <div class="columns">
    <div class="column">
      <div class="block">
        {%if user.is_authenticated %}
        {%get_flatpages settings.ADMIN_MESSAGE_PAGE_URL_PREFIX as admin_messages%}
        {%for admin_message in admin_messages %}
        <div class="notification is-info admin-message" data-id="{{admin_message.id}}">
          <button class="delete"></button>
          {%autoescape off%}
          {{admin_message.content}}
          {%endautoescape%}
        </div>
        {%endfor%}
        {% endif %}
        <ul class="message-wrapper">
          {% for message in messages %}
          <li{% if message.tags %} class="message is-{{ message.tags }}" {% endif %}>
            <div class="message-body">
              {% autoescape off %}{{ message }}{% endautoescape %}
            </div>
            </li>
            {% endfor %}
        </ul>
      </div>
      {% block content %}
      {% include "core/home.html" %}
      {% endblock %}
    </div>
  </div>
  <footer class="footer">
    <div class="content has-text-centered">
      {%if settings.SITE_FOOTER%}<p>{{settings.SITE_FOOTER}}</p>{%endif%}
      <p class="is-size-6">
        {% trans 'This site proudly built using' %}
        <a href="https://github.com/leolivier/cousins-matter"><strong>Cousins Matter</strong></a>.
        {% trans 'The source code is licensed' %}
        <a href="http://opensource.org/licenses/mit-license.php">{%icon "copyleft"%}MIT</a>.
        <br />
        {%if settings.SITE_COPYRIGHT%}
        {{settings.SITE_COPYRIGHT}}
        {%else%}
        {%trans 'Copyright © 2024 Cousins Matter. All rights reserved.'%}
        {%endif%}
        <br />
        <a href="{%url 'core:contact'%}">{%trans "Contact the site admin"%}</a> |
        {%with about_prefix='/'|add:LANGUAGE_CODE|add:'/about/' %}
        {% get_flatpages about_prefix as about_pages %}
        {% for page in about_pages %}
        <a href="{{ page.url }}">{{ page.title }}</a>
        {%if forloop.counter != about_pages|length %}|{%endif%}
        {% endfor %}
        {%endwith%}
      </p>
    </div>
  </footer>
  <div id="modal"></div>
</body>

</html>
