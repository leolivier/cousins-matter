{# bulma calendar imports #}
{% load static %}
<link href="{% static 'core/css/bulma-calendar.min.css' %}" rel="stylesheet">
<script src="{% static 'core/js/bulma-calendar.min.js' %}"></script>
<script>
	// bulma calendar integration
	$(document).ready(() => {
		// lang = navigator.language.substring(0, 2) || "en"
		lang = document.documentElement.lang || "en"
		date_fmt = get_format('SHORT_DATE_FORMAT')
		date_fmt = date_fmt.replace('y', 'yy').replace('Y', 'yyyy')
		date_fmt = date_fmt.replace('d', 'dd').replace('m', 'MM').replace('n', 'MM')
		// Initialize all input of date type.
		options = {
			"lang": lang, "dateFormat": date_fmt, "timeFormat": 'HH:mm:ss',
			"todayLabel": gettext("Today"), "clearLabel": gettext("Clear"),
			"nowLabel": gettext("Now"), "cancelLabel": gettext("Cancel"),
			"validateLabel": gettext("Validate"), "displayMode": "inline",
			"enableYearSwitch": true, "enableMonthSwitch": true,
			"minDate": new Date(1600, 1, 1), displayMode: "dialog"
		}
		function attachCalendar(className, type) {
			$(className).each(function () {
				let el = this;
				if (!el.bulmaCalendar) {
					let opts = { ...options, type: type };
					let val = el.getAttribute('value');
					if (val) {
						el.type = 'text'; // Prevent browser from clearing non-ISO dates
						el.value = val;
						if (val.includes('-') && val.split('-')[0].length === 4) {
							let parts = val.split(/[ T]/)[0].split('-');
							opts.startDate = new Date(parts[0], parts[1] - 1, parts[2]);
						}
					}
					bulmaCalendar.attach(el, opts);
				}
			});
		}
		attachCalendar('.dateinput', 'date');
		attachCalendar('.datetimeinput', 'datetime');
	});

	$(document).on('htmx:afterOnLoad', () => {
		// Re-attach calendars after htmx swap
		attachCalendar('.dateinput', 'date');
		attachCalendar('.datetimeinput', 'datetime');
	});
</script>
